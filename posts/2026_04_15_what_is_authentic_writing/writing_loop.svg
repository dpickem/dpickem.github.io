<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- VOICE.md box -->
  <rect x="265" y="20" width="190" height="56" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="42" text-anchor="middle" font-size="14" font-weight="600" fill="#312e81">VOICE.md</text>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#4f46e5">Writing style guide</text>

  <!-- Arrow: voice -> seed -->
  <line x1="360" y1="76" x2="360" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Seed post box -->
  <rect x="240" y="112" width="240" height="50" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="360" y="134" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Seed Post</text>
  <text x="360" y="150" text-anchor="middle" font-size="11" fill="#64748b">ideas, thoughts, topic</text>

  <!-- Arrow: seed -> ai drafts -->
  <line x1="360" y1="162" x2="360" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI drafts box -->
  <rect x="225" y="198" width="270" height="50" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">AI Drafts &amp; Structures</text>
  <text x="360" y="236" text-anchor="middle" font-size="11" fill="#3b82f6">applies VOICE.md style</text>

  <!-- Arrow: ai drafts -> human review -->
  <line x1="360" y1="248" x2="360" y2="282" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Human review box -->
  <rect x="235" y="284" width="250" height="50" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="306" text-anchor="middle" font-size="13" font-weight="600" fill="#78350f">Human Review &amp; Edit</text>
  <text x="360" y="322" text-anchor="middle" font-size="11" fill="#92400e">nothing ships unread</text>

  <!-- Arrow: human review -> publish -->
  <line x1="360" y1="334" x2="360" y2="368" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Publish box -->
  <rect x="260" y="370" width="200" height="46" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="360" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#064e3b">Publish</text>

  <!-- Iterate loop: human review -> ai drafts (right side) -->
  <path d="M485,309 L560,309 L560,223 L495,223" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="536" y="253" width="80" height="24" rx="4" fill="white"/>
  <text x="576" y="269" text-anchor="middle" font-size="11" font-weight="500" fill="#475569">iterate</text>

  <!-- Compounding loop: human review -> voice.md (left side, dashed) -->
  <path d="M235,309 L120,309 L120,48 L265,48" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="52" y="162" width="136" height="38" rx="4" fill="white"/>
  <text x="120" y="177" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">refine voice.md</text>
  <text x="120" y="191" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">(compounding loop)</text>
</svg>
