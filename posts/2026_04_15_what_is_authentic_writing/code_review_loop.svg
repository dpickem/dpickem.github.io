<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- CONTRIBUTING.md box -->
  <rect x="245" y="20" width="230" height="56" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="42" text-anchor="middle" font-size="14" font-weight="600" fill="#312e81">CONTRIBUTING.md</text>
  <text x="360" y="60" text-anchor="middle" font-size="11" fill="#4f46e5">Style &amp; coding guidelines</text>

  <!-- Arrow: contributing -> fetch -->
  <line x1="360" y1="76" x2="360" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fetch MR/PR box -->
  <rect x="255" y="112" width="210" height="50" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="360" y="134" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Fetch MR / PR</text>
  <text x="360" y="150" text-anchor="middle" font-size="11" fill="#64748b">via CLI tools</text>

  <!-- Arrow: fetch -> review -->
  <line x1="360" y1="162" x2="360" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI Review Agent box -->
  <rect x="230" y="198" width="260" height="50" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">AI Agent Reviews Code</text>
  <text x="360" y="236" text-anchor="middle" font-size="11" fill="#3b82f6">against CONTRIBUTING.md</text>

  <!-- Arrow: review -> post -->
  <line x1="360" y1="248" x2="360" y2="282" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Post Comments box -->
  <rect x="240" y="284" width="240" height="50" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="360" y="306" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Post Review Comments</text>
  <text x="360" y="322" text-anchor="middle" font-size="11" fill="#64748b">inline + overall via CLI</text>

  <!-- Arrow: post -> colleague -->
  <line x1="360" y1="334" x2="360" y2="368" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Colleague's Agent box -->
  <rect x="220" y="370" width="280" height="50" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="360" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Colleague's Agent</text>
  <text x="360" y="408" text-anchor="middle" font-size="11" fill="#64748b">addresses comments</text>

  <!-- Iterate loop: colleague -> review (right side) -->
  <path d="M500,395 L560,395 L560,223 L490,223" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="540" y="295" width="80" height="24" rx="4" fill="white"/>
  <text x="580" y="311" text-anchor="middle" font-size="11" font-weight="500" fill="#475569">iterate</text>

  <!-- Compounding loop: colleague -> contributing.md (left side, dashed) -->
  <path d="M220,395 L120,395 L120,48 L245,48" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
  <rect x="46" y="195" width="148" height="38" rx="4" fill="white"/>
  <text x="120" y="210" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">add missed patterns</text>
  <text x="120" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">(compounding loop)</text>
</svg>
